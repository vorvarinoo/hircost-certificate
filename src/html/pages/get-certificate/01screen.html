<section class="certificate-unbox quiz__screen" data-screen-get-certificate="1">

  <div class="certificate-unbox__container">

    <div class="certificate-unbox__inner">


      <div class="certificate-unbox__content">
        <div class="certificate-unbox__text certificate-unbox__text--one" data-hidden>Евгения, <br>вам подарок
        </div>
        <div class="envelope certificate-unbox__envelope">
          <div class="envelope__header envelope_">

            <svg class="envelope__cover envelope__cover--close envelope__cover--shadow" width="494" height="225"
              viewBox="0 0 494 225" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M493.881 29.8494V0.000587364L0.00012639 0.000587364V29.8122C0.00012639 34.123 1.9552 38.2011 5.31602 40.9007L222.775 215.575C229.9 221.298 238.765 224.418 247.905 224.418C257.102 224.418 266.021 221.258 273.167 215.468L488.612 40.8999C491.945 38.1994 493.881 34.1389 493.881 29.8494Z"
                fill="url(#paint0_linear_11560_133900)" />
              <defs>
                <linearGradient id="paint0_linear_11560_133900" x1="209.353" y1="255.079" x2="266.993" y2="34.4526"
                  gradientUnits="userSpaceOnUse">
                  <stop stop-color="#DCE9AD" />
                  <stop offset="1" stop-color="#B2CB9D" />
                </linearGradient>
              </defs>
            </svg>

          </div>
          <div class="envelope__main">
            @include('./../../common/certificate.html', {class: 'envelope__certificate'})
            <img class="envelope__back" src="./assets/img/envelope-back.png" aria-hidden="true">

            <img class="envelope__up" src="./assets/img/envelope-up.png" aria-hidden="true">

            <div class="envelope__label" data-envelope-label>
              <svg width="70" height="10" aria-hidden="true">
                <use xlink:href="assets/img/sprite.svg#logo"></use>
              </svg>
            </div>
          </div>
        </div>
        <div class="certificate-unbox__text certificate-unbox__text--two" data-hidden>
          открывайте
          <br>скорее!
        </div>
      </div>






      <div class="certificate-unbox__actions">
        <button class="btn btn-primary certificate-unbox__button" data-open-envelope data-hidden>
          Открыть
        </button>
        <div class="certificate-unbox__sender">
          от: Марина Колесова
        </div>
      </div>
    </div>

  </div>

</section>
