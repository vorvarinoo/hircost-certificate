<div class="tabs" data-jtabs="@if(context.dataJtabs){@dataJtabs}">
  <ul class="tabs__buttons" data-jtabs="nav">
    <li>
      <button class="tabs__button" type="button" data-jtabs="control">Себе</button>
    </li>
    <li>
      <button class="tabs__button" type="button" data-jtabs="control">Другому</button>
    </li>
  </ul>
  <div>
    <div data-jtabs="panel">
      <div class="form-inputs" data-form-self>
        <div class="form-inputs__title">
          Ссылка на сертификат придет по СМС
        </div>
        <div class="form-inputs__list">
          <div class="input" data-input="text">
            <div class="input__wrapper">
              <input type="text" class="input__input" id="name-self">
              <label for="name-self" class="input__label">Кому дарим</label>
              <button type="button" data-input-clear class="input__clear-button" aria-label="Очистить"></button>
            </div>

          </div>
          <div class="input" data-input="text">
            <div class="input__wrapper">
              <input type="text" class="input__input" id="phone-self">
              <label for="phone-self" class="input__label">Ваш телефон</label>
              <button type="button" data-input-clear class="input__clear-button" aria-label="Очистить"></button>
            </div>

          </div>
          <div class="input" data-input="text">
            <div class="input__wrapper">
              <input type="text" class="input__input" id="wishes-self">
              <label for="wishes-self" class="input__label">Пожелание</label>
              <button type="button" data-input-clear class="input__clear-button" aria-label="Очистить"></button>
            </div>

          </div>
        </div>
        <div class="form-inputs__error hidden" data-form-error>
          Обязательное поле для оформления сертификата
        </div>
      </div>

    </div>
    <div data-jtabs="panel">
      <div class="form-inputs" data-form-recipient>
        <div class="form-inputs__title">
          Ссылка на сертификат придет по СМС
        </div>
        <div class="form-inputs__list">
          <div class="input" data-input="text">
            <div class="input__wrapper">
              <input type="text" class="input__input" id="name-recipient">
              <label for="name-recipient" class="input__label">Получатель</label>
              <button type="button" data-input-clear class="input__clear-button" aria-label="Очистить"></button>
            </div>

          </div>

          <div class="input" data-input="text">
            <div class="input__wrapper">
              <input type="text" class="input__input" id="phone-recipient">
              <label for="phone-recipient" class="input__label">Телефон получателя</label>
              <button type="button" data-input-clear class="input__clear-button" aria-label="Очистить"></button>
            </div>

          </div>

          <div class="input" data-input="text">
            <div class="input__wrapper">
              <input type="text" class="input__input" id="wishes-recipient">
              <label for="wishes-recipient" class="input__label">Пожелание</label>
              <button type="button" data-input-clear class="input__clear-button" aria-label="Очистить"></button>
            </div>

          </div>

          <div class="input" data-input="text">
            <div class="input__wrapper">
              <input type="text" class="input__input" id="from-recipient">
              <label for="from-recipient" class="input__label">От кого</label>
              <button type="button" data-input-clear class="input__clear-button" aria-label="Очистить"></button>
            </div>

          </div>
        </div>
        <div class="form-inputs__error hidden" data-form-error>
          Обязательное поле для оформления сертификата
        </div>
      </div>
    </div>
  </div>
</div>
