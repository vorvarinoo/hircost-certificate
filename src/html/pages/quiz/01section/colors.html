<div class="create-design__colors">

    <div class="colors-buttons">
      <div class="d-lg-none" data-to-slide="prev" data-slider="certificate-design">
        <svg width="7" height="11" aria-hidden="true">
          <use xlink:href="assets/img/sprite.svg#slider-prev"></use>
        </svg>
      </div>

      <div class="d-lg-none" data-to-slide="next" data-slider="certificate-design">
        <svg width="7" height="11" aria-hidden="true">
          <use xlink:href="assets/img/sprite.svg#slider-next"></use>
        </svg>
      </div>
    </div>
  </div>

  <ul class="colors">
    <li>
      <label class="input-color-picker">
        <input type="radio" name="color-picker" data-color="linear-gradient(135deg, #aaebc2, #dbd292)" checked>

          style="--input-color: linear-gradient(135deg, #aaebc2, #dbd292);"></span>
      </label>
    </li>

    <li>
      <label class="input-color-picker">
        <input type="radio" name="color-picker" data-color="linear-gradient(135deg, #f6cceb, #aad5f3)">

          style="--input-color: linear-gradient(135deg, #f6cceb, #aad5f3);"></span>

    <li>

          style="--input-color: linear-gradient(135deg, #f6cceb, #aad5f3);"></span>

          style="--input-color: linear-gradient(230deg, #a9dfc6, #a1d15e, #85ae4e);"></span>

    <li>
