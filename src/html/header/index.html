<header class="site__header">
  <div class="d-none d-lg-flex justify-content-between align-content-center">
    <div class="logo">
      <svg width="181" height="26" aria-hidden="true">
        <use xlink:href="assets/img/sprite.svg#logo"></use>
      </svg>
    </div>

    @if(context.timeline){@include('../common/timeline.html')}

    <div class="d-inline-flex align-items-center">
      <a href="#" class="btn-close">
        <svg width="16" height="16" aria-hidden="true">
          <use xlink:href="assets/img/sprite.svg#cross"></use>
        </svg>
      </a>
    </div>
  </div>

  <div class="d-lg-none d-flex justify-content-between align-content-center">
    <div class="d-inline-flex align-items-center">
      <a class="d-inline-flex align-items-center" href="/">
        <svg width="8" height="14" aria-hidden="true">
          <use xlink:href="assets/img/sprite.svg#slider-prev"></use>
        </svg>
      </a>
    </div>

    <div class="quiz__subtitle" data-header-title>Выберите дизайн</div>

    <div class="d-inline-flex align-items-center">
      <a href="#" class="btn-close">
        <svg width="12" height="12" aria-hidden="true">
          <use xlink:href="assets/img/sprite.svg#cross"></use>
        </svg>
      </a>
    </div>
  </div>
</header>
